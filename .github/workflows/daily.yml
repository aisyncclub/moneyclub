name: Daily Market Briefing

on:
  schedule:
    - cron: '0 23 * * 0-4'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Collect data
        id: collect
        run: |
          set -o pipefail
          mkdir -p logs
          python scripts/collect_data.py 2>&1 | tee logs/collect.log

      - name: Generate briefing
        id: generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
        run: |
          set -o pipefail
          python scripts/generate_briefing.py 2>&1 | tee logs/generate.log

      - name: Resolve briefing date
        id: date
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          payload = json.loads(Path('data/latest.json').read_text(encoding='utf-8'))
          print(f"value={payload['date']}")
          PY

      - name: Deploy
        id: deploy
        run: |
          set -o pipefail
          python scripts/deploy.py --date "${{ steps.date.outputs.value }}" 2>&1 | tee logs/deploy.log

      - name: Create failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const files = ['logs/collect.log', 'logs/generate.log', 'logs/deploy.log'];
            let body = `자동 브리핑 배포가 실패했습니다.\n\n- Workflow: ${context.workflow}\n- Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n- SHA: ${context.sha}\n\n`;
            for (const file of files) {
              if (fs.existsSync(file)) {
                const text = fs.readFileSync(file, 'utf8').slice(-6000);
                body += `## ${file}\n\`\`\`\n${text}\n\`\`\`\n`;
              }
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[자동배포 실패] ${new Date().toISOString().slice(0, 10)} daily briefing`,
              body,
            });
